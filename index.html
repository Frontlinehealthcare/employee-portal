<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Frontline Healthcare — Employee Onboarding & Training Portal</title>
<style>
:root{
  --teal:#028090; --deep:#014A54; --seafoam:#00A896; --mint:#6FD8C7;
  --ink:#1A2E35; --slate:#526A72; --light:#F1F6F7; --amber:#F2A94B; --rust:#C0463A;
  --white:#fff; --line:#dce7e9; --ok:#1f8a5b;
  --shadow:0 6px 20px rgba(26,46,53,.10); --radius:14px;
  --head:Georgia,'Times New Roman',serif; --body:'Segoe UI',Calibri,system-ui,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--body);color:var(--ink);background:var(--light);line-height:1.5}
button{font-family:inherit;cursor:pointer}
a{color:var(--teal)}
.hidden{display:none!important}
.wrap{max-width:1080px;margin:0 auto;padding:0 18px}
.topbar{background:var(--deep);color:#fff;position:sticky;top:0;z-index:20;box-shadow:var(--shadow)}
.topbar .wrap{display:flex;align-items:center;gap:14px;height:62px}
.brand{font-family:var(--head);font-weight:700;font-size:20px;letter-spacing:.2px}
.brand small{display:block;font-family:var(--body);font-weight:400;font-size:11px;color:var(--mint);letter-spacing:.6px;text-transform:uppercase}
.topbar .spacer{flex:1}
.whoami{font-size:13px;color:var(--mint);text-align:right}
.whoami b{color:#fff;display:block;font-size:14px}
.linkbtn{background:transparent;border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:8px;padding:7px 12px;font-size:12.5px}
.linkbtn:hover{background:rgba(255,255,255,.12)}
.signin{min-height:90vh;display:flex;align-items:center;justify-content:center;padding:30px 18px;background:linear-gradient(135deg,#014A54,#02808f 70%,#00A896)}
.card-signin{background:#fff;border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.25);max-width:440px;width:100%;padding:34px 32px;text-align:center}
.logo-dot{width:64px;height:64px;border-radius:50%;background:var(--teal);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--head);font-weight:700;font-size:28px}
.card-signin h1{font-family:var(--head);font-size:25px;margin:.1em 0 .2em}
.card-signin p.sub{color:var(--slate);font-size:14px;margin:.2em 0 1.3em}
.field{text-align:left;margin:0 0 14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--slate);margin:0 0 5px}
.field .req{color:var(--rust)}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;color:var(--ink);background:#fff;font-family:inherit}
.field textarea{min-height:64px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal)}
.btn{background:var(--teal);color:#fff;border:none;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:600;width:100%}
.btn:hover{background:#026d7a}
.btn.amber{background:var(--amber);color:#3a2a06}.btn.amber:hover{background:#e89a35}
.btn.ghost{background:#fff;color:var(--teal);border:1.5px solid var(--teal)}
.btn.ghost:hover{background:var(--light)}
.btn.sm{width:auto;padding:9px 16px;font-size:13.5px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.fineprint{font-size:11.5px;color:var(--slate);margin-top:16px;line-height:1.45}
.page{padding:26px 0 70px}
.hello{font-family:var(--head);font-size:27px;margin:0 0 4px}
.hello small{font-family:var(--body);font-size:14px;color:var(--slate);font-weight:400}
.bar-outer{background:#e4eef0;height:12px;border-radius:8px;overflow:hidden;margin:14px 0 4px}
.bar-inner{background:linear-gradient(90deg,var(--seafoam),var(--teal));height:100%;width:0;transition:width .5s}
.progress-row{display:flex;justify-content:space-between;font-size:12.5px;color:var(--slate)}
.statline{display:flex;gap:18px;flex-wrap:wrap;margin:10px 0 0;font-size:12.5px;color:var(--slate)}
.statline b{color:var(--deep)}
.section-title{font-family:var(--head);font-size:19px;margin:30px 0 6px;display:flex;align-items:center;gap:9px}
.section-title .ic{width:30px;height:30px;border-radius:8px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px}
.section-sub{margin:0 0 12px;color:var(--slate);font-size:13.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.tile{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;display:flex;flex-direction:column;gap:8px;border-top:4px solid var(--teal);position:relative}
.tile h3{margin:2px 0 0;font-size:16px}
.tile p{margin:0;font-size:13px;color:var(--slate);flex:1}
.tile .meta{font-size:11.5px;color:var(--slate)}
.tile .badge{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.badge.done{background:#e3f5ec;color:var(--ok)}
.badge.todo{background:#eef3f4;color:var(--slate)}
.badge.prog{background:#fdeedd;color:#b5790f}
.tile .row{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap}
.tile-ic{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff;background:var(--teal)}
.tile.video{border-top-color:var(--amber)} .tile.video .tile-ic{background:var(--amber)}
.tile.comp{border-top-color:var(--seafoam)} .tile.comp .tile-ic{background:var(--seafoam)}
.tile.doc{border-top-color:var(--deep)} .tile.doc .tile-ic{background:var(--deep)}
.tile.prof{border-top-color:var(--amber)}
.viewer{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.viewer-head{background:var(--deep);color:#fff;padding:18px 24px}
.viewer-head .kick{font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--mint)}
.viewer-head h2{font-family:var(--head);margin:3px 0 0;font-size:23px}
.steps-dots{display:flex;gap:6px;padding:14px 24px 0;flex-wrap:wrap}
.dot{height:7px;border-radius:6px;background:#dce7e9;flex:1;min-width:18px}
.dot.active{background:var(--teal)} .dot.done{background:var(--seafoam)}
.viewer-body{padding:22px 28px;min-height:230px}
.viewer-body h3{font-family:var(--head);font-size:20px;margin:.1em 0 .5em;color:var(--deep)}
.viewer-body p{font-size:15px;margin:.2em 0 .8em}
.viewer-body ul{margin:.2em 0 .9em;padding-left:20px} .viewer-body li{font-size:14.5px;margin:5px 0}
.callout{background:var(--light);border-left:4px solid var(--amber);padding:12px 14px;border-radius:0 10px 10px 0;font-size:14px;margin:.6em 0}
.callout b{color:var(--deep)}
.viewer-foot{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-top:1px solid var(--line);background:#fafcfc}
.viewer-foot .stepcount{font-size:13px;color:var(--slate)}
.qblock{margin:0 0 18px}
.qblock .qq{font-weight:600;font-size:15.5px;margin:0 0 10px}
.opt{display:block;border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;margin:8px 0;font-size:14.5px;background:#fff;cursor:pointer;transition:.15s}
.opt:hover{border-color:var(--teal);background:var(--light)}
.opt.sel{border-color:var(--teal);background:#e9f5f6}
.opt.correct{border-color:var(--ok);background:#e3f5ec}
.opt.wrong{border-color:var(--rust);background:#fbe9e7}
.opt input{margin-right:9px}
.result{text-align:center;padding:14px}
.score-ring{width:120px;height:120px;border-radius:50%;margin:6px auto 10px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;font-family:var(--head);color:#fff}
.cert{border:3px double var(--teal);border-radius:14px;padding:32px;text-align:center;background:linear-gradient(180deg,#fff,#f6fbfb)}
.cert .seal{width:60px;height:60px;border-radius:50%;background:var(--amber);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px}
.cert h2{font-family:var(--head);font-size:26px;margin:.1em 0}
.cert .name{font-family:var(--head);font-size:30px;color:var(--deep);margin:.3em 0;border-bottom:2px solid var(--line);display:inline-block;padding:0 30px 6px}
.cert .muted{color:var(--slate);font-size:14px}
.backlink{background:none;border:none;color:var(--teal);font-size:14px;padding:8px 0;display:inline-flex;gap:6px;align-items:center}
.note{font-size:12.5px;color:var(--slate);background:#fff;border:1px dashed var(--line);border-radius:10px;padding:10px 12px;margin:14px 0}
.embed-slot{background:#0b1c20;border-radius:12px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:#9fc4c9;font-size:14px;text-align:center;padding:20px}
.flex{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
/* forms / profile */
.formcard{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 26px;margin:0 0 18px}
.formcard h3{font-family:var(--head);color:var(--deep);font-size:18px;margin:0 0 4px}
.formcard .fsub{color:var(--slate);font-size:13px;margin:0 0 16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
@media(max-width:620px){.form-grid{grid-template-columns:1fr}}
.photo-uploader{display:flex;gap:16px;align-items:center}
.avatar{width:88px;height:88px;border-radius:50%;background:var(--light);border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;color:var(--slate);font-size:12px;overflow:hidden;flex:0 0 auto}
.avatar img{width:100%;height:100%;object-fit:cover}
.secure-banner{background:#eef7f8;border:1.5px solid var(--mint);border-radius:12px;padding:14px 16px;font-size:13.5px;color:var(--deep);margin:0 0 16px}
.secure-banner b{color:var(--teal)}
.doc-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;margin:8px 0;background:#fff}
.doc-item .di-ic{width:34px;height:34px;border-radius:8px;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:17px;flex:0 0 auto}
.doc-item .di-txt{flex:1}.doc-item .di-txt b{font-size:14.5px}.doc-item .di-txt span{display:block;font-size:12px;color:var(--slate)}
.doc-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--teal)}
.pill{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:#eef3f4;color:var(--slate);margin-left:6px}
.pill.req{background:#fde7e3;color:var(--rust)}
/* toast */
#toasts{position:fixed;right:18px;bottom:18px;z-index:60;display:flex;flex-direction:column;gap:10px;max-width:320px}
.toast{background:var(--deep);color:#fff;border-radius:12px;padding:12px 15px;box-shadow:0 10px 30px rgba(0,0,0,.25);font-size:13.5px;opacity:0;transform:translateY(12px);transition:.3s;border-left:4px solid var(--seafoam)}
.toast.show{opacity:1;transform:none}
.toast b{display:block;color:var(--mint);font-size:12px;margin-bottom:2px}
/* modal */
.modal{position:fixed;inset:0;background:rgba(1,30,34,.55);display:flex;align-items:center;justify-content:center;z-index:70;padding:20px}
.modal-card{background:#fff;border-radius:18px;max-width:520px;width:100%;padding:30px;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,.35)}
.modal-card .big{width:74px;height:74px;border-radius:50%;background:#e3f5ec;color:var(--ok);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 14px}
.modal-card h2{font-family:var(--head);font-size:25px;margin:.1em 0 .3em;color:var(--deep)}
.modal-card p{color:var(--slate);font-size:14.5px}
@media print{.topbar,.viewer-foot,.no-print,#toasts{display:none!important}body{background:#fff}}
@media(max-width:560px){.topbar .wrap{height:auto;padding:10px 18px;flex-wrap:wrap}.hello{font-size:22px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>
<script>
/* ===================== CONFIG (admin: edit these) ===================== */
const CONFIG = {
  // Onboarding access codes issued by the administrative team. Add one per employee.
  // Example: "FLH-2026-AMARA". Leave array empty to allow any code.
  validCodes: ["FLH-STORM", "FLH-MILLIE"],
  // Secure form where SSN, driver's license #, and document UPLOADS are collected.
  // Paste your Wix Form (or JotForm/Google Form) link here:
  secureFormUrl: "https://alkahlivin7.wixforms.com/f/7471759551868437548",
  // Optional: email shown to employees for help
  onboardingEmail: "info@frontlinehealthcareohio.com"
};

/* ===================== ONBOARDING MODULES ===================== */
const ONBOARDING = [
  { id:"welcome", icon:"👋", title:"Welcome, Mission & Your Rights", min:18,
    desc:"Who we are, what we believe, and the rights that guide our work.",
    steps:[
      {h:"Welcome to the Frontline family", b:`<p>From our Founder & CEO, Millicent Ferguson:</p>
        <div class="callout"><i>"Welcome to the heart of Frontline Healthcare, where compassion meets purpose, and every team member is seen, valued, and empowered. You belong here! You were chosen because your spirit aligned with something much greater — a mission rooted in love, dignity, and caring. Each one of you is a vital thread in this tapestry we're weaving."</i></div>
        <p>Whatever your role — direct care, administration, or support — your contribution matters deeply. When we serve from the heart, we change lives.</p>`},
      {h:"Our mission & vision", b:`<div class="callout"><b>Mission:</b> "At Frontline Healthcare, we are committed to creating an inclusive and empowering environment where every individual is treated with dignity and compassion. We blend personalized care with both traditional and natural approaches to support the overall well-being of the mind, body, and spirit."</div>
        <p>We are an Ohio DODD-certified agency supporting individuals with developmental disabilities, aging adults, and others — through person-centered, home and community-based services. Our vision is to see every individual reach their highest potential and independence.</p>`},
      {h:"Our core values", b:`<p>These values guide everything we do:</p><ul>
        <li><b>Integrity</b> — we hold ourselves to the highest ethical standards, acting with honesty, accountability, and respect.</li>
        <li><b>Inclusive Care</b> — we embrace diversity and make our services accessible, respectful, and empowering to all.</li>
        <li><b>Compassion</b> — we treat every individual with empathy, patience, and genuine care.</li>
        <li><b>Holistic Respect</b> — we value both traditional medicine and natural wellness, honoring each person's unique needs.</li>
        <li><b>Collaboration & Community</b> — we believe in teamwork and partnerships that create lasting change.</li></ul>`},
      {h:"About this handbook & at-will employment", b:`<p>This portal puts the key parts of your Employee Handbook in one place. The handbook is a guideline that explains how we operate — it is not all-inclusive, and Frontline may change its policies at any time, with notice to employees.</p>
        <div class="callout"><b>At-will employment:</b> employment with Frontline is not for a fixed term and is by mutual consent. Either you or the agency may end the relationship at any time, with or without cause. Final interpretation of any policy is at the discretion of the CEO.</div>`},
      {h:"The people we serve: their rights (part 1)", b:`<p>Every individual we support has rights we must protect. These include the right to:</p><ul>
        <li>Be treated at all times with courtesy, respect, dignity, and individuality.</li>
        <li>A safe, sanitary living environment that respects privacy and independence.</li>
        <li>Adequate food, and timely access to medical and dental treatment.</li>
        <li>Appropriate care in the least intrusive manner.</li>
        <li>Privacy — both periods of privacy and places of privacy.</li>
        <li>Communicate freely and own and use personal possessions.</li></ul>`},
      {h:"The people we serve: their rights (part 2)", b:`<ul>
        <li>To make decisions that affect their own lives and manage their finances based on their ability.</li>
        <li>To develop their full potential and pursue vocational opportunities.</li>
        <li>To be free from emotional, psychological, and physical abuse.</li>
        <li>To participate in education, training, social development, and recreation.</li>
        <li>To voice grievances and recommend changes without restraint, coercion, discrimination, or reprisal.</li>
        <li>To be free from unnecessary chemical or physical restraints.</li>
        <li>To confidential treatment of all personal and medical records.</li></ul>
        <div class="callout"><b>This is serious:</b> violating any resident's rights leads to immediate disciplinary action, up to and including termination.</div>`},
      {h:"Your rights as staff", b:`<p>You have rights too. If, due to a conflict with your ethics, cultural values, or religious or personal beliefs, you wish not to participate in an aspect of a consumer's care, you may request not to — and Frontline will make a reasonable effort to approve it, as long as it doesn't harm the consumer's care or violate their rights.</p>
        <ul>
        <li><b>Equal employment:</b> Frontline complies with affirmative action laws. If you feel you weren't treated equally, contact Human Resources to file a complaint.</li>
        <li><b>Disabilities (ADA):</b> we reasonably accommodate qualified individuals with disabilities so they can perform their essential job duties.</li></ul>`},
      {h:"Your eligibility to work", b:`<p>In compliance with the Immigration Reform and Control Act, every new employee must complete <b>Form I-9</b> and present documents establishing identity and eligibility to work in the United States — this is a condition of employment.</p>
        <p>You'll handle these documents during onboarding. If you have questions about what to bring, ask Human Resources.</p>`}
    ]},

  { id:"working", icon:"🗓️", title:"Pay, Schedule, Benefits & Time Off", min:24,
    desc:"Employment status, schedules, pay, time off, leaves, and leaving well.",
    steps:[
      {h:"Employment categories", b:`<p>Your category determines your status and benefits eligibility:</p><ul>
        <li><b>Full-time:</b> signed a schedule agreement for 38+ hours per week.</li>
        <li><b>Part-time:</b> signed a schedule agreement for 37 hours or less.</li>
        <li><b>Seasonal:</b> interim or temporary staffing support — not eligible for benefits.</li>
        <li><b>PRN:</b> work "as needed," minimum 8 hours/month. Not picking up an 8-hour shift within 30 days is treated as a voluntary resignation. Not eligible for benefits.</li>
        <li><b>Independent contractors/consultants</b> are not employees and control their own methods and schedules.</li></ul>`},
      {h:"Benefits eligibility & performance reviews", b:`<ul>
        <li><b>Benefits eligibility</b> begins after 90 days of continuous full-time employment.</li>
        <li>Full-time staff who don't work their signed schedule may be changed to part-time and lose benefits eligibility.</li>
        <li>To change your status, talk to HR and sign a new shift agreement.</li></ul>
        <div class="callout"><b>Performance reviews:</b> new hires (and anyone promoted/transferred) have a 90-day probationary period ending in a review. Reviews continue quarterly, where goals are set and progress is discussed.</div>`},
      {h:"Your schedule & shift switches", b:`<p>You're assigned a fixed schedule at a specific site, but you may be asked to work other sites based on staffing needs. Failing to comply can lead to discipline up to termination.</p>
        <p><b>Need to switch a shift?</b> All three must happen:</p><ul>
        <li>The switch falls within the same pay period (check with your supervisor).</li>
        <li>An alternative-shift agreement is completed and signed by both staff.</li>
        <li>Your supervisor is notified, signs it, and turns it in to the Program Director.</li></ul>
        <p>Unauthorized switches can lead to corrective action; repeated violations to termination.</p>`},
      {h:"Timekeeping & timesheets", b:`<ul>
        <li>Accurately record your arrival and departure times on your timesheet.</li>
        <li>Any correction or change must include an explanation.</li>
        <li>Tampering with shift start/end times is falsification of documentation and is disciplined accordingly.</li></ul>`},
      {h:"Getting paid", b:`<ul>
        <li><b>Payday:</b> bi-weekly, on Fridays.</li>
        <li><b>Direct deposit:</b> enroll for automatic deposit. Otherwise, pick up your check at the office by noon on payday, or it's mailed home. You can enroll any time through HR.</li>
        <li><b>Paid less than expected?</b> Report it to Payroll and complete a pay-adjustment form; an investigation follows. Errors are corrected (sometimes the next pay period if documents were late).</li>
        <li><b>Paid more than expected?</b> You must report it — failing to do so can lead to corrective action.</li></ul>`},
      {h:"Holiday pay", b:`<p>Nonexempt employees earn <b>time-and-a-half</b> for hours worked on Frontline's observed holidays (those hours also count toward overtime):</p>
        <ul><li>New Year's Day</li><li>Memorial Day</li><li>Independence Day</li><li>Labor Day</li><li>Thanksgiving Day</li><li>Christmas Day</li></ul>`},
      {h:"Personal time & vacation", b:`<p><b>Personal time</b> (full-time staff): earn 1.85 hours each pay period you work at least 76 hours — up to 40 hours/year, capped at 48 hours. Use it for emergencies (notify your supervisor 8 hours before the shift) and approved purposes.</p>
        <p><b>Vacation</b> (full-time staff), added on your anniversary date:</p><ul>
        <li>40 hours after 1 year</li><li>40 hours after 2 years</li><li>80 hours after 3 years</li></ul>
        <p>Accrual is capped at 240 hours. Request vacation at least <b>15 days</b> ahead (<b>30 days</b> for 7+ shifts). If a request is denied, you're still expected to work — a no-show may lead to termination.</p>`},
      {h:"Calling off & attendance", b:`<ul>
        <li><b>Calling off:</b> notify your supervisor at least <b>12 hours</b> before your shift, or you can't use paid personal time to cover it.</li>
        <li>Arrive at least <b>5 minutes early</b>; arriving 3+ minutes after start is <b>late</b>.</li>
        <li>A one-day absence with no notice is treated as a <b>voluntary resignation</b>.</li>
        <li>3+ consecutive sick days require a doctor's note before returning.</li>
        <li>Leaving before your shift ends without notifying your supervisor is treated as a voluntary resignation.</li></ul>`},
      {h:"Leaves of absence", b:`<ul>
        <li><b>FMLA:</b> eligible employees (12+ months, 1,250 hours) may take up to 12 weeks for birth/adoption, a family member's serious health condition, or your own. Apply through HR as soon as you know.</li>
        <li><b>Personal leave:</b> for those who don't qualify for FMLA — request in writing at least 30 days ahead; granted case-by-case.</li>
        <li><b>Military leave (USERRA):</b> your position is protected when you serve; notify HR.</li>
        <li><b>Bereavement:</b> 3 days unpaid (or use personal/vacation time) for an immediate family member. Documentation may be requested.</li>
        <li><b>Jury duty:</b> notify your supervisor right away; you may use accrued time for pay with proof of service.</li></ul>`},
      {h:"Changes, leaving & benefits continuation", b:`<ul>
        <li><b>Info changes:</b> tell HR about changes to your name, marital status, dependents, address, emergency contacts, or phone.</li>
        <li><b>Resigning:</b> give your supervisor 3 weeks' written notice (date, effective date, reason) and work through it to be paid out accrued vacation (if employed full-time 1+ year).</li>
        <li><b>Return of property:</b> return all Frontline property in good condition upon request or separation.</li>
        <li><b>COBRA</b> lets you continue medical/dental/vision coverage after a qualifying event (at your cost). <b>Workers' comp</b> covers job-related injury — report any injury to your supervisor and HR and file an incident report within 24 hours.</li></ul>`}
    ]},

  { id:"conduct", icon:"🤝", title:"Conduct & Workplace Standards", min:18,

/* ===================== STATE & STORAGE ===================== */
const KEY="flh_portal_v2";
let STATE=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return {}}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(STATE))}catch(e){toast("Heads up","Storage is full — a profile photo may be too large.")} cloudSave();}
/* ===================== CLOUD SYNC (Wix Velo bridge) =====================
   Backward-compatible: still saves to localStorage. When the portal is embedded
   inside the Wix page (which runs the matching Velo code), progress also syncs
   to the signed-in member's record so it follows them across devices. If no Velo
   listener is present (direct link, old embed), these messages are simply ignored. */
var CLOUD={embedded:(window.parent&&window.parent!==window),got:false,tries:0};
function cloudPost(type,extra){if(!CLOUD.embedded)return;try{window.parent.postMessage(Object.assign({type:type},extra||{}),'*');}catch(e){}}
function cloudSave(){if(!CLOUD.embedded)return;if(cloudSave._t)clearTimeout(cloudSave._t);cloudSave._t=setTimeout(function(){cloudPost('FLH_SAVE_STATE',{state:STATE});},400);}
function cloudHello(){if(CLOUD.got||CLOUD.tries>6||!CLOUD.embedded)return;CLOUD.tries++;cloudPost('FLH_READY');setTimeout(cloudHello,800);}
window.addEventListener('message',function(e){
  var d=e.data;if(!d||typeof d!=='object'||!d.type||String(d.type).indexOf('FLH_')!==0)return;
  if(d.type==='FLH_LOAD_STATE'){
    CLOUD.got=true;
    if(d.state&&typeof d.state==='object'&&Object.keys(d.state).length){
      STATE=d.state;try{localStorage.setItem(KEY,JSON.stringify(STATE));}catch(_){}
      try{render();}catch(_){}
    } else { if(STATE&&Object.keys(STATE).length)cloudPost('FLH_SAVE_STATE',{state:STATE}); }
  }
});
cloudHello();

function prof(){STATE.profile=STATE.profile||{};return STATE.profile}
function prog(){STATE.prog=STATE.prog||{};return STATE.prog}
const app=document.getElementById('app');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function findModule(id){return ONBOARDING.find(m=>m.id===id)||COMPLIANCE.find(m=>m.id===id);}

/* ===================== TOAST NOTIFICATIONS ===================== */
function toast(title,msg){
  const wrap=document.getElementById('toasts'); if(!wrap)return;
  const el=document.createElement('div'); el.className='toast';
  el.innerHTML=`<b>${esc(title)}</b>${esc(msg)}`;
  wrap.appendChild(el); requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},4200);
}

/* ===================== ROUTER ===================== */
function go(view,arg){STATE._view=[view,arg];save();render();window.scrollTo&&window.scrollTo(0,0);}
function render(){
  if(!user()) return renderSignin();
  const [v,arg]=STATE._view||['dash'];
  if(v==='module') return renderModule(arg);
  if(v==='quiz') return renderQuiz(arg);
  if(v==='cert') return renderCert(arg);
  if(v==='videos') return renderVideos();
  if(v==='docs') return renderDocs();
  if(v==='profile') return renderProfile();
  if(v==='secure') return renderSecure();
  if(v==='ack') return renderAck();
  if(v==='nda') return renderNda();
  if(v==='attest') return renderAttest();
  if(v==='finish') return renderFinish();
  return renderDash();
}

function doSignin(){
  const name=(document.getElementById('si_name').value||'').trim();
  const role=document.getElementById('si_role').value;
  const code=(document.getElementById('si_code').value||'').trim();
  const err=document.getElementById('si_err');

  if(!name){return fail("Please enter your full name.");}
  if(!code){return fail("Please enter the access code from your administrator.");}
  const codes=CONFIG.validCodes||[];
  if(codes.length && !codes.map(c=>c.toLowerCase()).includes(code.toLowerCase())){
    return fail("That access code wasn't recognized. Check with your administrative team.");
  }

/* ===================== PROGRESS HELPERS ===================== */
function modState(id){const p=prog()[id];if(!p)return 'todo';if(p.passed||p.read)return 'done';if(p.step)return 'prog';return 'todo';}
function profileComplete(){return !!prof()._complete;}
function ackComplete(){return !!prog()._ack;}
function ndaComplete(){return !!prog()._nda;}
function attestComplete(){return !!prog()._attest;}
function secureComplete(){return !!prog()._secure;}
function checklist(){
  const items=[];
  items.push({k:'profile', label:'Employee profile', done:profileComplete()});
  ONBOARDING.forEach(m=>items.push({k:'o_'+m.id,label:m.title,done:modState(m.id)==='done'}));
  COMPLIANCE.forEach(m=>items.push({k:'c_'+m.id,label:m.title,done:!!(prog()[m.id]&&prog()[m.id].passed)}));
  items.push({k:'ack',label:'Handbook acknowledgment',done:ackComplete()});
  items.push({k:'nda',label:'Confidentiality & NDA agreement',done:ndaComplete()});
  items.push({k:'attest',label:'DODD background-check attestation',done:attestComplete()});
  items.push({k:'secure',label:'Secure documents submitted',done:secureComplete()});
  return items;
}
function overallPct(){const c=checklist();return Math.round(c.filter(i=>i.done).length/c.length*100);}
function trainingMinutesDone(){
  let m=0; COMPLIANCE.forEach(x=>{if(prog()[x.id]&&prog()[x.id].passed)m+=x.min;});
  ONBOARDING.forEach(x=>{if(modState(x.id)==='done')m+=x.min;}); return m;
}
function trainingMinutesTotal(){let m=0;[...ONBOARDING,...COMPLIANCE].forEach(x=>m+=x.min);return m;}
function badge(id,isComp){const st=modState(id);
  if(st==='done')return `<span class="badge done">✓ ${isComp?'Passed':'Done'}</span>`;
  if(st==='prog')return `<span class="badge prog">In progress</span>`;
  return `<span class="badge todo">Not started</span>`;}

/* ===================== MODULE VIEWER ===================== */
function renderModule(id){
  const m=findModule(id); if(!m){go('dash');return;}
  const isComp=!!m.lessons; const steps=isComp?m.lessons:m.steps;
  const p=prog(); p[id]=p[id]||{}; let i=Math.min(p[id].step||0,steps.length-1);
  function draw(){
    const st=steps[i];
    const dots=steps.map((_,k)=>`<span class="dot ${k<i?'done':''} ${k===i?'active':''}"></span>`).join('');
    const last=i===steps.length-1;
    shell(`<button class="backlink" onclick="go('dash')">&larr; Back to dashboard</button>
      <div class="viewer">
        <div class="viewer-head"><div class="kick">${isComp?'Compliance training · ~'+m.min+' min':'Onboarding module · ~'+m.min+' min'}</div><h2>${m.icon} ${esc(m.title)}</h2></div>
        <div class="steps-dots">${dots}</div>
        <div class="viewer-body"><h3>${esc(st.h)}</h3>${st.b}</div>
        <div class="viewer-foot"><span class="stepcount">Screen ${i+1} of ${steps.length}</span>
          <div class="flex">${i>0?`<button class="btn ghost sm" onclick="window._mvPrev()">&larr; Previous</button>`:''}
            <button class="btn sm" onclick="window._mvNext()">${last?(isComp?'Continue to quiz &rarr;':'Finish module ✓'):'Next &rarr;'}</button></div>
        </div></div>`);
  }
  window._mvPrev=()=>{i=Math.max(0,i-1);p[id].step=i;save();draw();};
  window._mvNext=()=>{
    if(i<steps.length-1){i++;p[id].step=i;save();draw();return;}
    if(isComp){go('quiz',id);} else {p[id].read=true;p[id].step=steps.length-1;save();toast("Module complete","“"+m.title+"” finished.");go('dash');}
  };
  draw();
}
/* ===================== QUIZ ENGINE ===================== */
function renderQuiz(id){
  const m=COMPLIANCE.find(x=>x.id===id); if(!m){go('dash');return;}
  const answers=new Array(m.quiz.length).fill(null); let submitted=false;
  function draw(){
    const qs=m.quiz.map((qq,qi)=>{
      const opts=qq.o.map((op,oi)=>{let cls='opt';
        if(submitted){if(oi===qq.a)cls+=' correct';else if(answers[qi]===oi)cls+=' wrong';}
        else if(answers[qi]===oi)cls+=' sel';
        return `<label class="${cls}"><input type="radio" name="q${qi}" ${answers[qi]===oi?'checked':''} ${submitted?'disabled':''} onclick="window._pick(${qi},${oi})">${esc(op)}</label>`;
      }).join('');
      return `<div class="qblock"><div class="qq">${qi+1}. ${esc(qq.q)}</div>${opts}</div>`;}).join('');
    shell(`<button class="backlink" onclick="go('module','${id}')">&larr; Back to lesson</button>
      <div class="viewer"><div class="viewer-head"><div class="kick">Quiz · ${m.quiz.length} questions · pass at 80%</div><h2>${m.icon} ${esc(m.title)} — Quiz</h2></div>
        <div class="viewer-body">${qs}${submitted?'':'<button class="btn" style="max-width:240px" onclick="window._submit()">Submit answers</button>'}</div></div>`);
  }
  window._pick=(qi,oi)=>{answers[qi]=oi;draw();};
  window._submit=()=>{
    if(answers.includes(null)){alert('Please answer every question before submitting.');return;}
    let correct=0; answers.forEach((a,qi)=>{if(a===m.quiz[qi].a)correct++;});
    const score=Math.round(correct/m.quiz.length*100); const passed=score>=80; submitted=true;
    const p=prog(); p[id]=p[id]||{};
    if(passed){p[id].passed=true;p[id].score=score;p[id].date=new Date().toLocaleDateString();toast("Quiz passed 🎉",m.title+" — "+score+"%");}
    else{p[id].score=score;toast("Almost there",m.title+" — "+score+"%. 80% needed.");}
    save();
    const ring=passed?'var(--ok)':'var(--rust)';
    setTimeout(()=>{const body=app.querySelector('.viewer-body');
      body.insertAdjacentHTML('afterbegin',`<div class="result"><div class="score-ring" style="background:${ring}">${score}%</div>
        <h3 style="margin:.1em 0">${passed?'You passed!':'Not quite — review and retry'}</h3>
        <p style="color:var(--slate)">${correct} of ${m.quiz.length} correct. ${passed?'Your certificate is ready.':'You need 80% to pass.'}</p>
        <div class="flex" style="justify-content:center">
          ${passed?`<button class="btn sm" style="width:auto" onclick="go('cert','${id}')">View certificate</button><button class="btn ghost sm" style="width:auto" onclick="go('dash')">Back to dashboard</button>`
                  :`<button class="btn sm" style="width:auto" onclick="go('quiz','${id}')">Retake quiz</button>`}
        </div></div>`);
      window.scrollTo&&window.scrollTo(0,0);},10);
    draw();
  };
  draw();
}

      ${d.req?'<span class="pill req">Required</span>':'<span class="pill">Optional</span>'}</div>`).join('');
  shell(`<button class="backlink" onclick="go('dash')">&larr; Back to dashboard</button>
    <h1 class="hello" style="font-size:23px">Secure documents & ID</h1>
    <div class="secure-banner">🔒 <b>Your privacy matters.</b> Sensitive information — your Social Security number, driver's license number, and document uploads — is collected through our <b>secure form</b>, not stored on this page. Please have your documents ready as photos or PDFs.</div>
    <div class="formcard"><h3>What to submit</h3><p class="fsub">Upload each item in the secure form. Required items must be received before onboarding is finalized.</p>
      ${list}
    </div>
    <div class="formcard"><h3>Submit securely</h3><p class="fsub">This opens Frontline's secure submission form in a new tab.</p>
      ${url?`<a class="btn" style="max-width:280px;text-decoration:none;text-align:center;display:inline-block" href="${esc(url)}" target="_blank" rel="noopener">Open secure document form &rarr;</a>`
           :`<button class="btn" style="max-width:320px" disabled>Secure form link not added yet</button>
             <div class="note">Admin: paste your secure Wix Form (or JotForm/Google Form) link into <b>CONFIG.secureFormUrl</b> in this file. That form is where SSN, license #, and uploads are safely collected.</div>`}
      <div class="field" style="margin-top:16px;max-width:420px"><label style="display:flex;gap:9px;align-items:flex-start;font-weight:400;color:var(--ink)">
        <input type="checkbox" id="sec_done" ${secureComplete()?'checked':''} style="width:20px;height:20px;accent-color:var(--teal);margin-top:1px" onclick="window._secureToggle()">
        <span>I have submitted my required documents through the secure form.</span></label></div>
    </div>`);
  window._secureToggle=()=>{const c=document.getElementById('sec_done').checked;prog()._secure=c?{date:new Date().toLocaleString()}:false;save();if(c)toast("Thank you","Documents marked as submitted.");};
}
/* ===================== VIDEOS ===================== */
function videoEmbed(v){
  if(!v.url) return `<div class="embed-slot">Video coming soon —<br>add a YouTube/Vimeo link for "${esc(v.title)}" in the VIDEOS list.</div>`;
  return `<div style="position:relative;aspect-ratio:16/9;border-radius:12px;overflow:hidden"><iframe src="${esc(v.url)}" style="position:absolute;inset:0;width:100%;height:100%;border:0" allowfullscreen></iframe></div>`;
}
function renderVideos(){
  const cards=VIDEOS.map(v=>`<div class="tile video"><h3>${esc(v.title)}</h3><p>${esc(v.desc)}</p>${videoEmbed(v)}</div>`).join('');
  shell(`<button class="backlink" onclick="go('dash')">&larr; Back to dashboard</button>
    <div class="section-title"><span class="ic">🎬</span>Video library</div>
    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">${cards}</div>`);
}
/* ===================== DOCUMENTS ===================== */
function renderDocs(){
  const rows=DOCUMENTS.map(d=>`<div class="tile doc"><div class="tile-ic">📄</div><h3>${esc(d.title)}</h3><p>${esc(d.desc)}</p>
    ${d.url?`<a class="btn ghost sm" style="text-decoration:none;text-align:center" href="${esc(d.url)}" target="_blank" rel="noopener">Open / download</a>`
          :`<button class="btn ghost sm" disabled>Link not added yet</button>`}</div>`).join('');
  shell(`<button class="backlink" onclick="go('dash')">&larr; Back to dashboard</button>
    <div class="section-title"><span class="ic">📄</span>Document library</div>
    <div class="grid">${rows}</div>
    <div class="note">Admin: add each document's link in the DOCUMENTS list (upload to Wix or Google Drive and paste the share links).</div>`);
}
/* ===================== ACKNOWLEDGMENT ===================== */
function renderAck(){
  const u=user(); const a=prog()._ack;
  if(a){shell(`<button class="backlink" onclick="go('dash')">&larr; Back to dashboard</button>
    <div class="viewer"><div class="viewer-head"><div class="kick">Acknowledgment</div><h2>✍️ Handbook acknowledgment</h2></div>
    <div class="viewer-body"><div class="callout"><b>On file (this device):</b> ${esc(a.name)} acknowledged the Employee Handbook on ${esc(a.date)}.</div></div></div>`);return;}
  shell(`<button class="backlink" onclick="go('dash')">&larr; Back to dashboard</button>
    <div class="viewer"><div class="viewer-head"><div class="kick">Acknowledgment</div><h2>✍️ Handbook acknowledgment</h2></div>
    <div class="viewer-body"><p>Please confirm the following:</p>
      <div class="callout">I acknowledge that I have received, read, and understand the Frontline Healthcare Employee Handbook, and I agree to follow its policies and standards. I understand the handbook is a guideline and may be updated.</div>
      <div class="field"><label>Type your full name to sign</label><input id="ack_name" value="${esc(u.name)}"></div>
      <button class="btn" style="max-width:230px" onclick="window._ackSign()">Sign acknowledgment</button></div></div>`);
  window._ackSign=()=>{const nm=(document.getElementById('ack_name').value||'').trim();if(!nm)return;prog()._ack={name:nm,date:new Date().toLocaleString()};save();toast("Signed ✓","Handbook acknowledgment recorded.");go('ack');};
}
/* ===================== CONFIDENTIALITY & NDA ===================== */
function renderNda(){
  const u=user(); const a=prog()._nda;
  if(a){shell(`<button class="backlink" onclick="go('dash')">&larr; Back to dashboard</button>
    <div class="viewer"><div class="viewer-head"><div class="kick">Acknowledgment</div><h2>🔒 Confidentiality & NDA</h2></div>
    <div class="viewer-body"><div class="callout"><b>On file (this device):</b> ${esc(a.name)} signed the Confidentiality & Non-Disclosure Agreement on ${esc(a.date)}.</div></div></div>`);return;}
  const agreement = `
    <p style="margin:.1em 0 .4em"><b>FRONTLINE HEALTHCARE LLC</b><br>Confidentiality & Non-Disclosure Agreement <span style="color:var(--slate)">(including agreement not to remove company documents)</span></p>
    <p>As an employee of Frontline Healthcare LLC ("Frontline"), I understand that I will have access to confidential and protected information about the individuals we serve, their families, my coworkers, and the agency's business. I agree to the following:</p>
    <p><b>1. Protected & confidential information.</b> I will keep strictly confidential all Protected Health Information (PHI) and personal information about the individuals we serve — including names, addresses, phone numbers, medical, behavioral, and financial information, service plans (ISPs), and records — consistent with HIPAA and Ohio law. I will also keep confidential the agency's business information, including its policies, procedures, forms, personnel data, and operational methods.</p>
    <p><b>2. Use only as needed.</b> I will access and use confidential information only as necessary to perform my job ("minimum necessary"), and will share it only with those directly involved in an individual's care or as authorized in writing.</p>
    <p><b>3. No disclosure.</b> I will not disclose confidential information to any unauthorized person, and will not discuss the individuals we serve outside of work or on social media. This obligation continues after my employment ends.</p>
    <p><b>4. No removal of documents or property.</b> I will not copy, photograph, download, email, remove, or otherwise take any agency documents, records, files, forms, policies and procedures, or other materials or property from Frontline — in physical or electronic form — except as required to perform my job and as authorized by the agency. All such materials remain the sole property of Frontline.</p>
    <p><b>5. Return of materials.</b> Upon request or at the end of my employment, I will immediately return all agency documents, records, devices, keys, and property in my possession, and will not keep copies.</p>
    <p><b>6. Reporting.</b> I will promptly report any suspected breach of confidentiality or loss of agency information to my supervisor or Human Resources.</p>
    <p><b>7. Consequences.</b> I understand that violating this agreement may result in disciplinary action up to and including termination, and may carry legal and financial consequences, including under HIPAA and Ohio law.</p>`;
  shell(`<button class="backlink" onclick="go('dash')">&larr; Back to dashboard</button>
    <div class="viewer"><div class="viewer-head"><div class="kick">Acknowledgment</div><h2>🔒 Confidentiality & Non-Disclosure Agreement</h2></div>
    <div class="viewer-body">
      <p>Please read this agreement carefully, then check the box and sign at the bottom.</p>
      <div class="callout" style="max-height:300px;overflow:auto;font-size:13.5px;line-height:1.5">${agreement}</div>
      <div class="field" style="margin-top:6px"><label style="display:flex;gap:9px;align-items:flex-start;font-weight:400;color:var(--ink)">
        <input type="checkbox" id="nda_agree" style="width:20px;height:20px;accent-color:var(--teal);margin-top:1px">
        <span>I have read, understand, and agree to this Confidentiality & Non-Disclosure Agreement.</span></label></div>
      <div class="field"><label>Type your full name to sign</label><input id="nda_name" value="${esc(u.name)}"></div>
      <button class="btn" style="max-width:240px" onclick="window._ndaSign()">Sign agreement</button></div></div>`);
  window._ndaSign=()=>{
    if(!document.getElementById('nda_agree').checked){alert('Please check the box to confirm you have read and agree.');return;}
    const nm=(document.getElementById('nda_name').value||'').trim(); if(!nm){return;}
    prog()._nda={name:nm,date:new Date().toLocaleString()};save();toast("Signed ✓","Confidentiality agreement recorded.");go('nda');
  };
}
/* ===================== DODD BACKGROUND-CHECK ATTESTATION ===================== */
function renderAttest(){
  const u=user(); const a=prog()._attest;
  if(a){shell(`<button class="backlink" onclick="go('dash')">&larr; Back to dashboard</button>
    <div class="viewer"><div class="viewer-head"><div class="kick">Attestation</div><h2>📋 Background check attestation</h2></div>
    <div class="viewer-body"><div class="callout"><b>On file (this device):</b> ${esc(a.name)} signed the DODD background-check attestation on ${esc(a.date)}.</div></div></div>`);return;}
  const offenses = `
    <p style="margin:.1em 0 .5em"><b>FRONTLINE HEALTHCARE LLC</b><br>Background Check Attestation <span style="color:var(--slate)">(Ohio DODD &mdash; Ohio Administrative Code 5123-2-02)</span></p>
    <p>Before I may be employed in a direct services position, Ohio law (OAC 5123-2-02) requires Frontline Healthcare to obtain a criminal records check (Ohio BCI&amp;I, and the FBI where applicable) and requires me to attest that I have not been convicted of, pleaded guilty to, or been found eligible for intervention in lieu of conviction for a "disqualifying offense." The disqualifying offenses are listed below by tier. Please review them carefully before signing.</p>
    <p><b>Tier 1 &mdash; Permanent exclusion.</b> Ohio Revised Code sections: 2903.01 aggravated murder; 2903.02 murder; 2903.03 voluntary manslaughter; 2903.11 felonious assault; 2903.15 permitting child abuse; 2903.16 failing to provide for a functionally impaired person; 2903.34 patient abuse/neglect; 2903.341 patient endangerment; 2905.01 kidnapping; 2905.02 abduction; 2905.32 trafficking in persons; 2905.33 unlawful conduct with respect to documents; 2907.02 rape; 2907.03 sexual battery; 2907.04 unlawful sexual conduct with a minor; 2907.05 gross sexual imposition; 2907.06 sexual imposition; 2907.07 importuning; 2907.08 voyeurism; 2907.12 felonious sexual penetration; 2907.31 disseminating matter harmful to juveniles; 2907.32 pandering obscenity; 2907.321 / 2907.322 / 2907.323 pandering or use of a minor or impaired person in obscene or nudity-oriented material; 2909.22 / 2909.23 / 2909.24 terrorism-related offenses; 2913.40 Medicaid fraud; conspiracy, attempt, or complicity (2923.01 / 2923.02 / 2923.03) to commit any of the above; fraud, theft, embezzlement, or other financial misconduct involving a federal- or state-funded program; and any substantially equivalent offense under other law.</p>
    <p><b>Tier 2 &mdash; Ten-year exclusion</b> (10 years from full discharge from imprisonment, probation, and parole): 2903.04 involuntary manslaughter; 2903.041 reckless homicide; 2905.04 child stealing (former); 2905.05 criminal child enticement; 2905.11 extortion; 2907.21 compelling prostitution; 2907.22 promoting prostitution; 2907.23 enticement/solicitation to patronize a prostitute; 2909.02 aggravated arson; 2909.03 arson; 2911.01 aggravated robbery; 2911.11 aggravated burglary; 2913.46 illegal use of SNAP/WIC benefits; 2913.48 workers' compensation fraud; 2913.49 identity fraud; 2917.02 aggravated riot; 2923.12 / 2923.122 / 2923.123 / 2923.13 / 2923.161 / 2923.162 / 2923.21 weapons offenses; 2923.32 engaging in a pattern of corrupt activity; 2923.42 participating in a criminal gang; 2925.02 corrupting another with drugs; 2925.03 trafficking in drugs; 2925.04 / 2925.041 illegal manufacture of drugs or chemicals; 3716.11 placing harmful objects in food; conspiracy/attempt/complicity to commit any of the above; and any substantially equivalent offense.</p>
    <p><b>Tier 3 &mdash; Seven-year exclusion</b> (7 years from full discharge): 959.13 / 959.131 cruelty to animals or companion animals; 2903.12 aggravated assault; 2903.21 aggravated menacing; 2903.211 menacing by stalking; 2905.12 coercion; 2909.04 disrupting public services; 2911.02 robbery; 2911.12 burglary; 2913.47 insurance fraud; 2917.01 inciting to violence; 2917.03 riot; 2917.31 inducing panic; 2919.22 endangering children; 2919.25 domestic violence; 2921.03 intimidation; 2921.11 perjury; 2921.13 falsification; 2921.34 escape; 2921.35 aiding escape; 2921.36 illegal conveyance into a detention facility; 2925.05 funding of drug trafficking; 2925.06 illegal distribution of anabolic steroids; 2925.24 tampering with drugs; 2927.12 ethnic intimidation; conspiracy/attempt/complicity to commit any of the above; and any substantially equivalent offense.</p>
    <p><b>Tier 4 &mdash; Five-year exclusion</b> (5 years from full discharge): 2903.13 assault; 2903.22 menacing; 2907.09 public indecency; 2907.24 soliciting; 2907.25 prostitution; 2907.33 deception to obtain matter harmful to juveniles; 2911.13 breaking and entering; 2913.02 theft; 2913.03 unauthorized use of a vehicle; 2913.04 unauthorized use of property; 2913.05 telecommunications fraud; 2913.11 passing bad checks; 2913.21 misuse of credit cards; 2913.31 forgery; 2913.32 criminal simulation; 2913.41 defrauding a rental agency or hostelry; 2913.42 tampering with records; 2913.43 securing writings by deception; 2913.44 personating an officer; 2913.441 unlawful display of a law-enforcement emblem; 2913.45 defrauding creditors; 2913.51 receiving stolen property; 2919.12 / 2919.121 / 2919.123 / 2919.124 unlawful abortion offenses; 2919.23 interference with custody; 2919.24 contributing to the unruliness or delinquency of a child; 2921.12 tampering with evidence; 2921.21 compounding a crime; 2921.24 disclosure of confidential information; 2921.32 obstructing justice; 2921.321 harming a police dog/horse or service dog; 2921.51 impersonating a peace officer; 2925.09 dangerous-drug offenses involving livestock; 2925.11 possession of controlled substances (other than a minor drug-possession offense); 2925.13 permitting drug abuse; 2925.22 deception to obtain a dangerous drug; 2925.23 illegal processing of drug documents; 2925.36 illegal dispensing of drug samples; 2925.55 / 2925.56 unlawful purchase or sale of pseudoephedrine or ephedrine; conspiracy/attempt/complicity to commit any of the above; and any substantially equivalent offense.</p>
    <p><b>Tier 5 &mdash; No exclusion.</b> 2925.11 possession of controlled substances and 2925.14 illegal use or possession of drug paraphernalia (and substantially equivalent offenses) do not, by themselves, preclude employment.</p>
    <p style="color:var(--slate);font-size:12.5px">Note: Multiple disqualifying offenses can extend the exclusion period. Certain exceptions apply (for example, an unconditional pardon, an overturned conviction, or a valid Certificate of Qualification for Employment for non-Tier 1 offenses). This is a summary for your review; the full rule (OAC 5123-2-02) and the Ohio Revised Code control.</p>`;
  const statements = `
    <p style="margin-top:.6em">By signing below, I attest and agree as follows:</p>
    <p><b>1.</b> I have <b>not</b> been convicted of, pleaded guilty to, or been found eligible for intervention in lieu of conviction for any disqualifying offense listed above.</p>
    <p><b>2.</b> I will disclose to Frontline any conviction for an offense that has been sealed.</p>
    <p><b>3.</b> I agree to notify Frontline in writing within fourteen (14) calendar days if, while employed, I am formally charged with, convicted of, plead guilty to, or am found eligible for intervention in lieu of conviction for a disqualifying offense. I understand failure to do so may result in termination.</p>
    <p><b>4.</b> I understand any employment offered before my completed criminal records check is received is <b>conditional</b>, and that my employment will end immediately if a disqualifying offense is identified, or by the sixty-first (61st) day if the check has not yet been received.</p>
    <p><b>5.</b> The information I have provided is true and complete to the best of my knowledge.</p>`;
  shell(`<button class="backlink" onclick="go('dash')">&larr; Back to dashboard</button>
    <div class="viewer"><div class="viewer-head"><div class="kick">Attestation</div><h2>📋 Background Check Attestation (Ohio DODD)</h2></div>
    <div class="viewer-body">
      <p>Please read the disqualifying offenses and the statements below, then check the box and sign.</p>
      <div class="callout" style="max-height:320px;overflow:auto;font-size:13px;line-height:1.5">${offenses}${statements}</div>
      <div class="field" style="margin-top:6px"><label style="display:flex;gap:9px;align-items:flex-start;font-weight:400;color:var(--ink)">
        <input type="checkbox" id="att_agree" style="width:20px;height:20px;accent-color:var(--teal);margin-top:1px">
        <span>I have read the list of disqualifying offenses above. The statements I am attesting to are true, and I agree to the notification requirement.</span></label></div>
      <div class="field"><label>Type your full name to sign</label><input id="att_name" value="${esc(u.name)}"></div>
      <button class="btn" style="max-width:240px" onclick="window._attSign()">Sign attestation</button>
      <p class="fineprint">This attestation reflects Ohio DODD rule 5123-2-02. Frontline recommends final review by its compliance officer or attorney before official use.</p>
    </div></div>`);
  window._attSign=()=>{
    if(!document.getElementById('att_agree').checked){alert('Please check the box to confirm your attestation.');return;}
    const nm=(document.getElementById('att_name').value||'').trim(); if(!nm){return;}
    prog()._attest={name:nm,date:new Date().toLocaleString()};save();toast("Signed ✓","Background check attestation recorded.");go('attest');
  };
}
/* ===================== FINISH / COMPLETION PROMPT ===================== */
function renderFinish(){
  const u=user();
  if(!checklist().every(i=>i.done)){go('dash');return;}
  prog()._finished={date:new Date().toLocaleString()};save();
  shell(`<div class="modal"><div class="modal-card">
    <div class="big">✓</div>
    <h2>You're all set, ${esc(u.name.split(' ')[0])}!</h2>
    <p>You've completed your onboarding modules, training, profile, and acknowledgments. Everything will be entered into our system, and <b>someone from the Frontline onboarding team will reach out to you shortly</b> to finish the process.</p>
    <p style="margin-top:10px">Questions in the meantime? Contact us at <b>${esc(CONFIG.onboardingEmail||'')}</b>.</p>
    <div class="flex" style="justify-content:center;margin-top:18px">
      <button class="btn sm" style="width:auto" onclick="go('dash')">Back to dashboard</button>
      <button class="btn ghost sm" style="width:auto" onclick="window.print()">🖨 Print summary</button></div>
    <p class="fineprint" style="margin-top:14px">Reminder: make sure your required documents are submitted through the secure form.</p>
  </div></div>`);
  toast("Onboarding submitted 🎉","The onboarding team has been notified.");
}
/* ===================== INIT ===================== */
render();
</script>
</body>
</html>
